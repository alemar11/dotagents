interface:
  display_name: "Skills Maintainer"
  short_description: "Maintain and improve one or more skills in this repository with shared upgrade workflows and skill-specific refresh tasks."
  brand_color: "#B85C00"
  default_prompt: "Run the requested skill-maintenance workflow for one or more skills in this repository. Treat maintenance as one unified task: if the user gives no targets, do a repo-wide pass; if the user names skills, do targeted maintenance; if the user explicitly asks for metadata/docs alignment, stay in metadata-only mode."
