interface:
  display_name: "Learn"
  short_description: "Capture durable corrections or preferences and write confirmed learnings only to AGENTS.md. Use when the user sets lasting guidance."
  brand_color: "#2F9E44"
  default_prompt: "Capture the durable correction or preference from this conversation. Treat hard-rule, always, never, default, remember, and AGENTS.md language as strong durable-guidance signals. Confirm which AGENTS.md target to write, recommending AGENTS.md when ownership is unclear, place it in the most appropriate section, and suffix each inserted bullet with (Codex learning). Do not write memory files."
